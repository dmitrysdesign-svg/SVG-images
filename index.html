<head>

      <img src="./Bird.svg" alt="Bird">
      <img src="./Savy.svg" alt="Savy">
      <img src="./Stern.svg" alt="Stern">
      <img src="./Projector.svg" alt="Projector">
      <img src="./Madgicx.svg" alt="Madgicx">
      <img src="./Mysionics.svg" alt="Mysionics">
      <img src="./Fortitude.svg" alt="Fortitude">
      <img src="./Panafrican.svg" alt="Panafrican">
    </div>
  </div>

</html>
